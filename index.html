<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #cepInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #cepInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .resultado {
            margin-top: 30px;
        }

        .resultado.hidden {
            display: none;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            border-left: 5px solid #667eea;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .info-group {
            margin-bottom: 15px;
        }

        .info-group label {
            display: block;
            color: #666;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .info-group p {
            color: #333;
            font-size: 1.1em;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .erro {
            background: #fee;
            border-left: 5px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .erro.hidden {
            display: none;
        }

        #mensagemErro {
            color: #c62828;
            font-weight: 600;
            margin: 0;
        }

        .carregando {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .carregando.hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .search-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Buscador de CEP</h1>
        <p class="subtitle">Digite seu CEP para encontrar o endereço completo</p>
        
        <div class="search-box">
            <input 
                type="text" 
                id="cepInput" 
                placeholder="Digite o CEP (ex: 01310-100)"
                maxlength="9"
            >
            <button onclick="buscarCEP()">Buscar</button>
        </div>

        <div id="resultado" class="resultado hidden">
            <div class="card">
                <h2>Informações do Endereço</h2>
                <div class="info-group">
                    <label>CEP:</label>
                    <p id="cep">-</p>
                </div>
                <div class="info-group">
                    <label>Logradouro (Rua/Avenida):</label>
                    <p id="logradouro">-</p>
                </div>
                <div class="info-group">
                    <label>Bairro:</label>
                    <p id="bairro">-</p>
                </div>
                <div class="info-group">
                    <label>Cidade:</label>
                    <p id="cidade">-</p>
                </div>
                <div class="info-group">
                    <label>Estado:</label>
                    <p id="estado">-</p>
                </div>
            </div>
        </div>

        <div id="erro" class="erro hidden">
            <p id="mensagemErro"></p>
        </div>

        <div id="carregando" class="carregando hidden">
            <p>⏳ Buscando informações...</p>
        </div>
    </div>

    <script>
        // Permitir buscar ao pressionar Enter
        document.getElementById('cepInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                buscarCEP();
            }
        });

        // Formatar CEP enquanto digita (XXXXX-XXX)
        document.getElementById('cepInput').addEventListener('input', function(event) {
            let valor = event.target.value.replace(/\D/g, '');
            
            if (valor.length > 8) {
                valor = valor.substring(0, 8);
            }
            
            if (valor.length > 5) {
                valor = valor.substring(0, 5) + '-' + valor.substring(5);
            }
            
            event.target.value = valor;
        });

        async function buscarCEP() {
            const cepInput = document.getElementById('cepInput');
            const cep = cepInput.value.replace(/\D/g, '');

            // Validar se o CEP foi preenchido
            if (cep.length !== 8) {
                mostrarErro('Por favor, digite um CEP válido com 8 dígitos!');
                return;
            }

            // Limpar mensagens anteriores
            limparMensagens();
            mostrarCarregando();

            try {
                // Chamada para a API ViaCEP
                const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await resposta.json();

                // Verificar se o CEP foi encontrado
                if (dados.erro) {
                    mostrarErro('CEP não encontrado! Verifique e tente novamente.');
                    return;
                }

                // Exibir os dados
                exibirResultado(dados, cep);

            } catch (erro) {
                mostrarErro('Erro ao buscar CEP. Verifique sua conexão com a internet.');
                console.error('Erro:', erro);
            }
        }

        function exibirResultado(dados, cep) {
            // Formatar CEP (XXXXX-XXX)
            const cepFormatado = cep.substring(0, 5) + '-' + cep.substring(5);

            document.getElementById('cep').textContent = cepFormatado;
            document.getElementById('logradouro').textContent = dados.logradouro || '-';
            document.getElementById('bairro').textContent = dados.bairro || '-';
            document.getElementById('cidade').textContent = dados.localidade || '-';
            document.getElementById('estado').textContent = dados.uf || '-';

            // Mostrar resultado e esconder carregamento
            document.getElementById('resultado').classList.remove('hidden');
            document.getElementById('carregando').classList.add('hidden');
        }

        function mostrarErro(mensagem) {
            document.getElementById('mensagemErro').textContent = mensagem;
            document.getElementById('erro').classList.remove('hidden');
            document.getElementById('carregando').classList.add('hidden');
        }

        function limparMensagens() {
            document.getElementById('erro').classList.add('hidden');
            document.getElementById('resultado').classList.add('hidden');
        }

        function mostrarCarregando() {
            document.getElementById('carregando').classList.remove('hidden');
        }
    </script>
</body>
</html>
